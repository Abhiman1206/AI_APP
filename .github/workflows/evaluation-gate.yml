name: Evaluation Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - backend/src/evaluation/**
      - backend/tests/evaluation/**
      - backend/evaluation/**
      - backend/scripts/run_evaluation.py
      - .github/workflows/evaluation-gate.yml

jobs:
  evaluation-gate:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.11"
      ENFORCE_THRESHOLDS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run evaluation tests
        working-directory: backend
        run: |
          python tests/evaluation/test_metrics.py
          python tests/evaluation/test_validators.py
          python tests/evaluation/test_benchmark_runner.py
          python tests/evaluation/test_run_day2.py
          python tests/evaluation/test_contract_gate.py

      - name: Run evaluation gate (dry-run)
        if: env.ENFORCE_THRESHOLDS == 'false'
        working-directory: backend
        run: |
          python scripts/run_evaluation.py

      - name: Run evaluation gate (strict)
        if: env.ENFORCE_THRESHOLDS == 'true'
        working-directory: backend
        run: |
          python scripts/run_evaluation.py --enforce-thresholds

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: backend/evaluation/reports
